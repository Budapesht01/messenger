<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Мессенджер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth" class="auth-container">
        <h2>Вход / Регистрация</h2>
        <input type="text" id="authUsername" placeholder="Имя пользователя">
        <input type="password" id="authPassword" placeholder="Пароль">
        <button onclick="register()">Зарегистрироваться</button>
        <button onclick="login()">Войти</button>
        <div id="authError" style="color:red;"></div>
    </div>

    <div id="chat" style="display:none;">
        <div class="sidebar">
            <div class="user-info" id="userInfo"></div>
            <div class="search">
                <input type="text" id="searchInput" placeholder="Поиск сообщений">
            </div>
            <div class="users-list" id="usersList">
                <h4>Пользователи</h4>
                <div id="usersContainer"></div>
            </div>
        </div>
        <div class="main">
            <div class="chat-header" id="chatHeader">Общий чат</div>
            <div class="messages" id="messages"></div>
            <div class="typing-indicator" id="typingIndicator"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Введите сообщение...">
                <button id="sendBtn">Отправить</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
