<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Мессенджер</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        #messages { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; background: #f9f9f9; margin-bottom: 10px; }
        .message { margin: 8px 0; }
        .username { font-weight: bold; color: #2c3e50; }
        .time { font-size: 0.8em; color: #7f8c8d; margin-left: 10px; }
        .text { margin-top: 4px; }
        .controls { margin-bottom: 10px; }
        input, button { padding: 5px; margin-right: 5px; }
    </style>
</head>
<body>
    <h1>Чат</h1>
    <div class="controls">
        <input type="text" id="username" placeholder="Ваше имя" value="Гость">
        <input type="text" id="message" placeholder="Сообщение" onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Отправить</button>
    </div>
    <div id="messages"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const messagesDiv = document.getElementById('messages');
        let username = document.getElementById('username');

        // Получение истории при подключении
        socket.on('history', (messages) => {
            messages.forEach(msg => addMessageToChat(msg));
        });

        // Новое сообщение от сервера
        socket.on('receive_message', (msg) => {
            addMessageToChat(msg);
        });

        function addMessageToChat(msg) {
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `<span class="username">${escapeHtml(msg.username)}</span>
                             <span class="time">${msg.time}</span>
                             <div class="text">${escapeHtml(msg.text)}</div>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function sendMessage() {
            const text = document.getElementById('message').value.trim();
            if (!text) return;
            socket.emit('send_message', {
                username: username.value.trim() || 'Аноним',
                text: text
            });
            document.getElementById('message').value = '';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
