<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Мессенджер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth" class="auth-container">
        <div class="auth-card">
            <h2>Добро пожаловать</h2>
            <input type="text" id="authUsername" placeholder="Имя пользователя">
            <input type="password" id="authPassword" placeholder="Пароль">
            <div class="auth-buttons">
                <button onclick="register()">Зарегистрироваться</button>
                <button onclick="login()">Войти</button>
            </div>
            <div id="authError" class="error"></div>
        </div>
    </div>

    <div id="chat" class="chat-container" style="display:none;">
        <div class="sidebar">
            <div class="user-info" id="userInfo"></div>
            <div class="tabs">
                <button class="tab-btn active" data-tab="friends">Друзья</button>
                <button class="tab-btn" data-tab="search">Поиск</button>
                <button class="tab-btn" data-tab="requests">Запросы</button>
                <button class="tab-btn" data-tab="settings">Настройки</button>
            </div>
            <div class="tab-content active" id="friends-tab">
                <div id="friendsList"></div>
            </div>
            <div class="tab-content" id="search-tab">
                <input type="text" id="searchUserInput" placeholder="Поиск пользователей...">
                <div id="searchResults"></div>
            </div>
            <div class="tab-content" id="requests-tab">
                <div id="requestsList"></div>
            </div>
            <div class="tab-content" id="settings-tab">
                <div class="settings-panel">
                    <h4>Профиль</h4>
                    <label>Аватар (эмодзи):</label>
                    <input type="text" id="avatarInput" maxlength="2" placeholder="😀">
                    <label>Цвет ника:</label>
                    <input type="color" id="colorInput">
                    <button onclick="updateProfile()">Сохранить</button>
                    <hr>
                    <button onclick="logout()" class="logout-btn">Выйти из аккаунта</button>
                </div>
            </div>
        </div>
        <div class="main">
            <div class="chat-header" id="chatHeader">
                Общий чат
                <span class="header-actions">
                    <button id="clearChatBtn" style="display:none;">Очистить чат</button>
                </span>
            </div>
            <div class="messages" id="messages"></div>
            <div class="typing-indicator" id="typingIndicator"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Введите сообщение...">
                <button id="sendBtn">Отправить</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
