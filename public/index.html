<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Мессенджер</title>
    <link rel="stylesheet" href="style.css?v=final">
</head>
<body>
    <div id="auth" class="auth-container">
        <div class="auth-card">
            <h2>Добро пожаловать</h2>
            <input type="text" id="authUsername" placeholder="Имя пользователя">
            <input type="password" id="authPassword" placeholder="Пароль">
            <div class="auth-buttons">
                <button onclick="register()">Зарегистрироваться</button>
                <button onclick="login()">Войти</button>
            </div>
            <div id="authError" class="error"></div>
        </div>
    </div>

    <div id="chat" class="chat-container" style="display:none;">
        <div class="sidebar" id="sidebar">
            <div class="user-info" id="userInfo"></div>
            <div class="tabs">
                <button class="tab-btn active" data-tab="friends">Друзья</button>
                <button class="tab-btn" data-tab="search">Поиск</button>
                <button class="tab-btn" data-tab="requests">Запросы</button>
                <button class="tab-btn" data-tab="settings">Настройки</button>
            </div>
            <div class="tab-content active" id="friends-tab">
                <div id="friendsList"></div>
            </div>
            <div class="tab-content" id="search-tab">
                <input type="text" id="searchUserInput" placeholder="Поиск пользователей...">
                <div id="searchResults"></div>
            </div>
            <div class="tab-content" id="requests-tab">
                <div id="requestsList"></div>
            </div>
            <div class="tab-content" id="settings-tab">
                <div class="settings-panel">
                    <h4>Профиль</h4>
                    <div class="avatar-selector">
                        <label>Аватар:</label>
                        <div class="avatar-preview" id="avatarPreview">😀</div>
                        <button id="pickAvatarBtn" class="secondary-btn">Выбрать эмодзи</button>
                    </div>
                    <div class="color-selector">
                        <label>Цвет ника:</label>
                        <input type="color" id="colorInput">
                    </div>
                    <button id="saveProfileBtn" class="primary-btn">Сохранить</button>
                    <hr>
                    <button id="logoutBtn" class="logout-btn">Выйти из аккаунта</button>
                </div>
            </div>
        </div>
        <div class="main">
            <div class="chat-header">
                <button id="menuToggleBtn" class="menu-toggle">☰</button>
                <span class="chat-title" id="chatTitle">Выберите чат</span>
            </div>
            <div class="messages" id="messages"></div>
            <div class="typing-indicator" id="typingIndicator"></div>
            <div class="input-area" id="inputArea" style="display: none;">
                <input type="text" id="messageInput" placeholder="Сообщение...">
                <button id="sendBtn" class="send-btn">Отправить</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js?v=final"></script>
</body>
</html>
